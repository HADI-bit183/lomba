<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found – NovaMind</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- CSS Libraries -->
  <link rel="preload" href="assets/vendor/css/fonts.css" as="style">
  <link href="assets/vendor/css/fonts.css" rel="stylesheet">
  <link href="assets/vendor/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  
  <!-- Custom CSS -->
  <link href="css/variables.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
  <link href="css/responsive.css" rel="stylesheet">
  <link href="css/animation.css" rel="stylesheet">
  <link href="css/refresh.css?v=20260708-motion-idle" rel="stylesheet">
  
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="assets/logo.svg">
  <script>
    (function() {
      const savedTheme = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const isDark = savedTheme === 'dark' || (!savedTheme && prefersDark);
      if (isDark) {
        document.documentElement.classList.add('dark-theme');
        document.documentElement.setAttribute('data-bs-theme', 'dark');
      } else {
        document.documentElement.classList.remove('dark-theme');
        document.documentElement.setAttribute('data-bs-theme', 'light');
      }
    })();
  </script>
</head>
<body class="page-404 d-flex flex-column min-vh-100">
  <nav id="navbar" class="navbar navbar-expand-lg sticky-top glass py-2">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center" href="index.html">
        <img src="assets/logo.svg" alt="NovaMind Logo" class="logo me-2" width="32" height="32">
        <span class="brand-text">NovaMind</span>
      </a>
      <button class="btn btn-outline-dark ms-auto" id="dark-mode-toggle" aria-label="Toggle dark mode"><i class="fa-solid fa-moon"></i></button>
    </div>
  </nav>

  <main class="not-found-main flex-grow-1 d-flex align-items-center py-5">
    <div class="not-found-orbit" aria-hidden="true">
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
    </div>
    <div class="container text-center position-relative">
      <div class="row justify-content-center">
        <div class="col-lg-6 col-md-8">
          <div class="lost-compass mb-4 text-primary" aria-hidden="true">
            <span class="compass-halo"></span>
            <span class="compass-ring"></span>
            <i class="fa-solid fa-compass"></i>
          </div>
          <h1 class="not-found-code display-1 fw-bold text-body mb-2" aria-label="404">
            <span>4</span><span>0</span><span>4</span>
          </h1>
          <h2 class="not-found-title h3 fw-bold mb-3">Page Not Found</h2>
          <p class="not-found-copy text-muted mb-5 mx-auto">
            The page you are looking for might have been removed, had its name changed, or is temporarily unavailable. Let's get you back on track.
          </p>
          <a href="index.html" class="not-found-action btn btn-primary btn-lg rounded-pill px-5 shadow-sm hover-lift">
            <i class="fa-solid fa-arrow-left me-2"></i> Back to Home
          </a>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer py-4 glass text-body mt-auto">
    <div class="container text-center text-muted small">
      &copy; 2026 NovaMind. All rights reserved.
    </div>
  </footer>

  <script defer src="assets/vendor/js/bootstrap.bundle.min.js"></script>
  <script defer src="js/ui-refresh.js"></script>
  <style>
    .page-404 {
      background:
        radial-gradient(circle at 50% 34%, rgba(101, 88, 245, 0.12), transparent 34%),
        radial-gradient(circle at 14% 74%, rgba(8, 185, 199, 0.11), transparent 28%),
        var(--gradient-hero);
    }

    .not-found-main {
      min-height: calc(100vh - 178px);
      overflow: hidden;
      position: relative;
    }

    .not-found-main::before {
      background-image:
        linear-gradient(rgba(101, 88, 245, 0.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(101, 88, 245, 0.045) 1px, transparent 1px);
      background-size: 58px 58px;
      content: "";
      inset: 0;
      mask-image: radial-gradient(circle at center, #000 0%, transparent 72%);
      opacity: 0.85;
      pointer-events: none;
      position: absolute;
    }

    .not-found-orbit {
      inset: 0;
      pointer-events: none;
      position: absolute;
    }

    .not-found-orbit span {
      animation: drift 12s ease-in-out infinite;
      background: linear-gradient(135deg, var(--accent), var(--primary));
      border-radius: var(--radius-full);
      box-shadow: 0 12px 34px rgba(101, 88, 245, 0.24);
      height: 12px;
      opacity: 0.35;
      position: absolute;
      width: 12px;
    }

    .not-found-orbit span:nth-child(1) { left: 14%; top: 22%; }
    .not-found-orbit span:nth-child(2) { animation-delay: -2s; height: 8px; left: 78%; top: 20%; width: 8px; }
    .not-found-orbit span:nth-child(3) { animation-delay: -4s; height: 10px; left: 18%; top: 74%; width: 10px; }
    .not-found-orbit span:nth-child(4) { animation-delay: -6s; height: 16px; left: 84%; top: 68%; width: 16px; }
    .not-found-orbit span:nth-child(5) { animation-delay: -8s; height: 7px; left: 35%; top: 16%; width: 7px; }
    .not-found-orbit span:nth-child(6) { animation-delay: -10s; height: 9px; left: 63%; top: 82%; width: 9px; }

    .lost-compass {
      animation: compassFloat 4.8s var(--ease-spring) infinite;
      display: inline-grid;
      font-size: clamp(5.8rem, 13vw, 8.5rem);
      isolation: isolate;
      place-items: center;
      position: relative;
      transform-origin: 50% 58%;
    }

    .lost-compass i {
      animation: compassNeedle 7s ease-in-out infinite;
      background: var(--gradient-accent);
      background-clip: text;
      filter: drop-shadow(0 18px 34px rgba(101, 88, 245, 0.24));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      z-index: 2;
    }

    .compass-halo,
    .compass-ring {
      border-radius: var(--radius-full);
      position: absolute;
    }

    .compass-halo {
      animation: haloPulse 2.8s ease-in-out infinite;
      background: radial-gradient(circle, rgba(101, 88, 245, 0.22), transparent 68%);
      height: 1.5em;
      width: 1.5em;
      z-index: -1;
    }

    .compass-ring {
      animation: ringSpin 9s linear infinite;
      border: 2px dashed rgba(101, 88, 245, 0.32);
      height: 1.18em;
      width: 1.18em;
      z-index: 1;
    }

    .not-found-code {
      animation: riseIn 700ms var(--ease-out) 110ms both;
      font-size: clamp(4.5rem, 13vw, 7rem);
      letter-spacing: 0;
      line-height: 0.95;
    }

    .not-found-code span {
      animation: digitPop 760ms var(--ease-spring) both;
      background: var(--gradient-accent);
      background-clip: text;
      display: inline-block;
      margin-inline: 0.03em;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .not-found-code span:nth-child(2) {
      animation-delay: 120ms;
    }

    .not-found-code span:nth-child(3) {
      animation-delay: 230ms;
    }

    .not-found-title {
      animation: riseIn 700ms var(--ease-out) 260ms both;
    }

    .not-found-copy {
      animation: riseIn 700ms var(--ease-out) 380ms both;
    }

    .not-found-action {
      animation: riseIn 700ms var(--ease-out) 500ms both;
      box-shadow: 0 16px 36px rgba(101, 88, 245, 0.22) !important;
      overflow: hidden;
      position: relative;
    }

    .not-found-action::after {
      animation: buttonShine 3.6s ease-in-out infinite;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.42), transparent);
      content: "";
      inset: 0 auto 0 -60%;
      position: absolute;
      transform: skewX(-18deg);
      width: 45%;
    }

    @keyframes compassFloat {
      0%, 100% { transform: translateY(0) rotate(-3deg); }
      50% { transform: translateY(-18px) rotate(4deg); }
    }

    @keyframes compassNeedle {
      0%, 100% { transform: rotate(0deg) scale(1); }
      35% { transform: rotate(-12deg) scale(1.03); }
      70% { transform: rotate(14deg) scale(0.99); }
    }

    @keyframes haloPulse {
      0%, 100% { opacity: 0.55; transform: scale(0.82); }
      50% { opacity: 1; transform: scale(1.08); }
    }

    @keyframes ringSpin {
      to { transform: rotate(360deg); }
    }

    @keyframes drift {
      0%, 100% { transform: translate3d(0, 0, 0) scale(1); }
      50% { transform: translate3d(18px, -24px, 0) scale(1.18); }
    }

    @keyframes riseIn {
      from { opacity: 0; transform: translateY(18px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes digitPop {
      from { opacity: 0; transform: translateY(24px) scale(0.86); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes buttonShine {
      0%, 46% { left: -60%; }
      72%, 100% { left: 120%; }
    }

    @media (max-width: 575.98px) {
      .not-found-main {
        min-height: calc(100vh - 156px);
      }

      .not-found-action {
        width: 100%;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .lost-compass,
      .lost-compass i,
      .compass-halo,
      .compass-ring,
      .not-found-code,
      .not-found-code span,
      .not-found-title,
      .not-found-copy,
      .not-found-action,
      .not-found-action::after,
      .not-found-orbit span {
        animation: none !important;
      }
    }
  </style>
</body>
</html>
