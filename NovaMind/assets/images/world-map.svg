<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500" fill="none">
  <defs>
    <linearGradient id="mapBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1E293B;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="landGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:0.3"/>
    </linearGradient>
  </defs>
  <rect width="1000" height="500" fill="url(#mapBg)" rx="12"/>
  <!-- Simplified world continents -->
  <!-- North America -->
  <path d="M150 100 L250 80 L280 120 L270 180 L230 200 L200 250 L160 230 L140 180 Z" fill="url(#landGrad)" stroke="#2563EB" stroke-width="1" opacity="0.8"/>
  <!-- South America -->
  <path d="M230 260 L270 250 L290 300 L280 370 L250 400 L220 380 L210 320 Z" fill="url(#landGrad)" stroke="#7C3AED" stroke-width="1" opacity="0.8"/>
  <!-- Europe -->
  <path d="M450 80 L520 70 L540 110 L530 150 L500 160 L470 140 L450 120 Z" fill="url(#landGrad)" stroke="#06B6D4" stroke-width="1" opacity="0.8"/>
  <!-- Africa -->
  <path d="M470 170 L530 160 L560 200 L550 300 L520 350 L480 340 L460 280 L450 220 Z" fill="url(#landGrad)" stroke="#2563EB" stroke-width="1" opacity="0.8"/>
  <!-- Asia -->
  <path d="M560 60 L720 50 L780 100 L770 180 L700 200 L640 190 L580 160 L550 120 Z" fill="url(#landGrad)" stroke="#7C3AED" stroke-width="1" opacity="0.8"/>
  <!-- Australia -->
  <path d="M750 300 L830 290 L850 330 L830 370 L780 370 L750 340 Z" fill="url(#landGrad)" stroke="#06B6D4" stroke-width="1" opacity="0.8"/>
  <!-- Innovation hub dots -->
  <circle cx="200" cy="150" r="6" fill="#2563EB" opacity="0.9"><animate attributeName="r" values="4;8;4" dur="2s" repeatCount="indefinite"/></circle>
  <circle cx="490" cy="110" r="6" fill="#06B6D4" opacity="0.9"><animate attributeName="r" values="4;8;4" dur="2.5s" repeatCount="indefinite"/></circle>
  <circle cx="650" cy="120" r="6" fill="#7C3AED" opacity="0.9"><animate attributeName="r" values="4;8;4" dur="3s" repeatCount="indefinite"/></circle>
  <circle cx="500" cy="250" r="5" fill="#38BDF8" opacity="0.8"><animate attributeName="r" values="3;6;3" dur="2.2s" repeatCount="indefinite"/></circle>
  <circle cx="790" cy="330" r="5" fill="#2563EB" opacity="0.8"><animate attributeName="r" values="3;6;3" dur="2.8s" repeatCount="indefinite"/></circle>
  <circle cx="250" cy="300" r="5" fill="#7C3AED" opacity="0.8"><animate attributeName="r" values="3;6;3" dur="1.8s" repeatCount="indefinite"/></circle>
  <!-- Connection lines -->
  <line x1="200" y1="150" x2="490" y2="110" stroke="#2563EB" stroke-width="0.5" opacity="0.3"/>
  <line x1="490" y1="110" x2="650" y2="120" stroke="#06B6D4" stroke-width="0.5" opacity="0.3"/>
  <line x1="200" y1="150" x2="250" y2="300" stroke="#7C3AED" stroke-width="0.5" opacity="0.3"/>
  <line x1="650" y1="120" x2="790" y2="330" stroke="#2563EB" stroke-width="0.5" opacity="0.3"/>
  <line x1="490" y1="110" x2="500" y2="250" stroke="#7C3AED" stroke-width="0.5" opacity="0.3"/>
  <!-- Labels -->
  <text x="500" y="460" font-family="Inter, sans-serif" font-size="14" fill="rgba(255,255,255,0.4)" text-anchor="middle">NovaMind Global Innovation Network — 124 Countries</text>
</svg>
