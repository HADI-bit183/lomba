      <circle r="7" fill="#fff" stroke="#6558f5" stroke-width="2"/>
      <circle r="2.6" fill="#6558f5"/>
    </g>
    <g transform="translate(789 282)">
      <circle r="22" fill="url(#hub-glow)" filter="url(#soft-glow)"/>
      <circle r="8" fill="#fff" stroke="#08b9c7" stroke-width="2"/>
      <circle r="3" fill="#08b9c7"/>
    </g>
    <g transform="translate(922 208)">
      <circle r="19" fill="url(#hub-glow)" filter="url(#soft-glow)"/>
      <circle r="7" fill="#fff" stroke="#4c8dff" stroke-width="2"/>
      <circle r="2.6" fill="#4c8dff"/>
    </g>
    <g transform="translate(953 420)">
      <circle r="22" fill="url(#hub-glow)" filter="url(#soft-glow)"/>
      <circle r="8" fill="#fff" stroke="#08b9c7" stroke-width="2"/>
      <circle r="3" fill="#08b9c7"/>
    </g>
    <g transform="translate(1081 455)">
      <circle r="18" fill="url(#hub-glow)" filter="url(#soft-glow)"/>
      <circle r="6.5" fill="#fff" stroke="#6558f5" stroke-width="2"/>
      <circle r="2.5" fill="#6558f5"/>
