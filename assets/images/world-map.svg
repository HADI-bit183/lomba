    <clipPath id="land-clip">
      <use href="#continents"/>
    </clipPath>
  </defs>

  <!-- quiet latitude / longitude guides -->
  <g fill="none" stroke="#8090d9" stroke-width="1" opacity=".09">
    <path d="M55 195 C330 155 855 155 1145 195"/>
    <path d="M45 305 C330 282 870 282 1155 305"/>
    <path d="M60 415 C355 455 865 455 1140 415"/>
    <path d="M410 54 C365 170 365 430 420 548"/>
    <path d="M790 50 C835 175 835 426 780 550"/>
  </g>

  <!-- complete continent silhouettes -->
  <use href="#continents" fill="url(#land-wash)" stroke="#7380e9" stroke-width="1.2" stroke-opacity=".2"/>
  <rect x="34" y="42" width="1128" height="490" fill="url(#dot-grid)" clip-path="url(#land-clip)"/>

  <!-- global routes -->
  <g fill="none" stroke="url(#route-gradient)" stroke-width="1.8" stroke-linecap="round"
     stroke-dasharray="5 7" opacity=".48">
    <path d="M154 173 Q280 112 535 151"/>
    <path d="M236 225 Q352 171 535 151"/>
    <path d="M236 225 Q263 292 276 363"/>
    <path d="M535 151 Q557 181 556 234"/>
    <path d="M556 234 Q625 172 694 171"/>
    <path d="M694 171 Q816 114 922 208"/>
    <path d="M694 171 Q754 218 789 282"/>
    <path d="M789 282 Q868 245 922 208"/>
    <path d="M789 282 Q865 350 953 420"/>
    <path d="M953 420 Q1008 404 1081 455"/>
    <path d="M556 234 Q648 307 743 264"/>
  </g>

