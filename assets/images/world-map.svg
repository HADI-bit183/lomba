<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-labelledby="map-title map-desc">
  <title id="map-title">NovaMind global innovation network</title>
  <desc id="map-desc">A complete dotted world map with connected innovation hubs across every inhabited continent.</desc>

  <defs>
    <pattern id="dot-grid" width="12" height="12" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="2.15" fill="#6f7cff" opacity=".52"/>
    </pattern>

    <linearGradient id="land-wash" x1="80" y1="80" x2="1090" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6558f5" stop-opacity=".15"/>
      <stop offset=".52" stop-color="#4c8dff" stop-opacity=".12"/>
      <stop offset="1" stop-color="#08b9c7" stop-opacity=".16"/>
    </linearGradient>

    <linearGradient id="route-gradient" x1="110" y1="220" x2="1080" y2="430" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6558f5"/>
      <stop offset=".52" stop-color="#4c8dff"/>
      <stop offset="1" stop-color="#08b9c7"/>
    </linearGradient>

    <radialGradient id="hub-glow">
      <stop offset="0" stop-color="#4c8dff" stop-opacity=".42"/>
      <stop offset=".45" stop-color="#6558f5" stop-opacity=".16"/>
      <stop offset="1" stop-color="#6558f5" stop-opacity="0"/>
    </radialGradient>

    <filter id="soft-glow" x="-300%" y="-300%" width="700%" height="700%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>

    <g id="continents">
      <!-- North America -->
      <path d="M74 145
        C88 111 120 89 158 87
        L181 69 218 78 240 67 275 79
        L294 98 326 104 349 125 341 146
        L313 154 300 174 276 177 264 199
        L240 205 226 224 213 251 193 259
        L176 243 168 220 147 211 131 188
        L104 181 90 164 Z"/>
      <!-- Alaska and Aleutians -->
      <path d="M57 121 L77 104 105 106 116 121 95 133 72 132 Z"/>
      <path d="M49 136 L39 143 55 147 67 141 Z"/>
      <!-- Central America -->
      <path d="M194 255 L213 251 225 264 236 274 251 282
        L247 292 231 290 220 279 204 275 Z"/>
      <!-- South America -->
      <path d="M251 286
        C275 281 307 290 326 311
        L337 340 329 369 314 389
        L306 420 291 445 283 475
        L266 501 250 475 245 443
        L228 416 222 385 207 355
        L211 327 229 305 Z"/>
      <!-- Greenland -->
      <path d="M300 67 L330 49 365 56 382 79 367 111
        L340 127 316 112 301 89 Z"/>

      <!-- Europe -->
      <path d="M505 144
        L523 127 546 130 557 115 573 120
        L581 137 602 137 615 149 608 164
        L586 166 574 181 552 180 541 166
        L519 165 Z"/>
      <!-- United Kingdom and Iceland -->
      <path d="M497 125 L507 115 516 122 511 137 501 139 Z"/>
      <path d="M480 99 L495 92 507 100 499 109 484 108 Z"/>
      <!-- Africa -->
