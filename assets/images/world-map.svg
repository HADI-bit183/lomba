      <!-- Asia -->
      <path d="M610 144
        L628 124 660 119 684 101 721 103
        L747 91 778 101 811 96 837 111
        L873 115 894 133 925 137 947 158
        L980 172 1000 198 993 219 966 224
        L946 240 920 242 903 262 878 264
        L860 284 837 279 820 258 797 252
        L780 231 755 229 738 211 711 214
        L692 197 665 198 650 181 625 174 Z"/>
      <!-- Arabian Peninsula -->
