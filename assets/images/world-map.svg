      <!-- Japan -->
      <path d="M939 221 L948 230 943 243 934 247 936 233 Z"/>
      <path d="M949 249 L956 257 951 270 944 264 Z"/>
      <!-- Philippines -->
      <path d="M873 292 L882 299 878 313 869 308 Z"/>
      <path d="M882 318 L889 325 884 337 876 330 Z"/>
      <!-- Indonesia -->
      <path d="M807 350 L829 347 842 354 828 362 810 360 Z"/>
      <path d="M848 360 L873 358 888 365 868 371 850 369 Z"/>
      <path d="M896 370 L919 368 933 375 914 381 898 379 Z"/>
      <!-- Papua New Guinea -->
      <path d="M944 352 L970 350 986 362 975 376 950 371 Z"/>

      <!-- Australia -->
      <path d="M895 394
        C920 374 960 370 993 382
        L1020 400 1034 430 1024 461
        L1000 481 966 486 938 474
        L911 452 892 424 Z"/>
      <!-- Tasmania -->
      <path d="M978 500 L994 499 1000 512 987 520 976 511 Z"/>
      <!-- New Zealand -->
      <path d="M1081 436 L1090 449 1085 466 1076 457 Z"/>
      <path d="M1069 473 L1077 482 1069 496 1060 488 Z"/>
